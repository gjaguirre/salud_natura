<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --verde-oscuro:  #0d2b1a;
            --verde-medio:   #1a4a2e;
            --verde-claro:   #2d6e45;
            --verde-menta:   #4a9b6f;
            --dorado:        #d4af37;
            --dorado-oscuro: #b5890a;
            --crema:         #f5f0e8;
            --texto:         #e8e0d0;
        }

        body {
            font-family: 'EB Garamond', 'Palatino Linotype', Georgia, serif;
            background: linear-gradient(135deg, #040f08 0%, #0d2b1a 40%, #1a3d25 70%, #0a1f12 100%);
            color: var(--texto);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Resplandor central, como el hero del sitio */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(45,110,69,0.15) 0%, transparent 70%);
        }

        /* ===== HOJAS DORADAS FLOTANTES ===== */
        .hoja {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--dorado);
            opacity: 0.35;
            border-radius: 0 50% 0 50%;
            animation: caer linear infinite;
            top: -30px;
        }

        .hoja1 { left: 15%; animation-duration: 14s; animation-delay: 0s; }
        .hoja2 { left: 35%; animation-duration: 18s; animation-delay: -6s; transform: scale(0.7); }
        .hoja3 { left: 60%; animation-duration: 12s; animation-delay: -3s; }
        .hoja4 { left: 80%; animation-duration: 20s; animation-delay: -10s; transform: scale(1.3); }
        .hoja5 { left: 48%; animation-duration: 16s; animation-delay: -8s; transform: scale(0.5); }

        @keyframes caer {
            0%   { top: -30px; transform: translateX(0) rotate(0deg); }
            50%  { transform: translateX(40px) rotate(180deg); }
            100% { top: 110%; transform: translateX(-40px) rotate(360deg); }
        }

        /* ===== TARJETA DE CONTENIDO ===== */
        .tarjeta {
            position: relative;
            z-index: 10;
            max-width: 640px;
            padding: 3rem;
            background: rgba(13, 43, 26, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 6px;
            box-shadow: 0 0 40px rgba(212,175,55,0.15), 0 0 80px rgba(45,110,69,0.2);
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--crema);
            line-height: 1.2;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        h1 span { color: var(--dorado); }

        .subtitulo {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--verde-menta);
            margin-bottom: 1.75rem;
        }

        .separador {
            width: 80px;
            height: 1px;
            margin: 0 auto 1.75rem;
            background: linear-gradient(90deg, transparent, var(--dorado), transparent);
        }

        p {
            color: var(--texto);
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="hoja hoja1"></div>
    <div class="hoja hoja2"></div>
    <div class="hoja hoja3"></div>
    <div class="hoja hoja4"></div>
    <div class="hoja hoja5"></div>

    <div class="tarjeta">
        <h1>Hola <span>Mundo</span></h1>
        <div class="subtitulo">Salud Natura</div>
        <div class="separador"></div>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    </div>
</body>
</html>
