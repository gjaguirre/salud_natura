<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Ariel</h1>
        <h2>Vendedores de Salud Natura por Rubro</h2>
    </header>

    <main>
        <div class="descripcion">
            <p>Un directorio de vendedores organizados por rubro para encontrar fácilmente lo que necesitás.</p>
        </div>
    </main>

    <footer>
        <p>Salud Natura</p>
    </footer>

    <button
        onclick="window.location.href='/tutorial/'"
        onmouseover="this.style.background='#4a8024'"
        onmouseout="this.style.background='#2d5016'"
        style="
            background: #2d5016;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 2rem auto;
            display: block;
        ">
        ← Volver al Tutorial
    </button>

</body>
</html>
