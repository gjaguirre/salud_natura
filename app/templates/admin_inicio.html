<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — {{ settings.app_name }}</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>🌿 Admin</h2>
            <p>{{ settings.app_name }}</p>
        </div>
        <ul>
            <li><a href="/admin" class="active">🏠 Inicio</a></li>
            <li><a href="/admin/remedios">🌱 Remedios</a></li>
            <li><a href="/admin/usuarios">👥 Usuarios</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/">← Volver al sitio</a>
        </div>
    </nav>
    <main class="content">
        <h1>Panel de Administración</h1>
        <div class="stats">
            <div class="stat-card">
                <h3>🌱 Remedios</h3>
                <p class="stat-number">{{ total_remedios }}</p>
                <a href="/admin/remedios">Gestionar</a>
            </div>
            <div class="stat-card">
                <h3>👥 Usuarios</h3>
                <p class="stat-number">{{ total_usuarios }}</p>
                <a href="/admin/usuarios">Gestionar</a>
            </div>
        </div>
    </main>
</body>
</html>
